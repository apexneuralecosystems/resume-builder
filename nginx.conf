server {
    listen 3232 default_server;
    listen [::]:3232 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Frontend container healthcheck (no backend dependency)
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Proxy all /api/* requests to the backend service
    client_max_body_size 50m;
    location ^~ /api/ {
        proxy_pass         https://resume.builderbackend.apexneural.cloud;
        proxy_http_version 1.1;
        # Important: many reverse proxies route by Host header.
        # Use the upstream host for backend routing, and preserve the original
        # frontend host separately for observability.
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        # Allow up to 2 min for large resume / LLM calls
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_ssl_server_name on;
    }
}
